<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400&family=Manrope:wght@400;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "tertiary-fixed": "#e4e2e2","surface-variant": "#353535","on-secondary-container": "#b5b5b5",
          "primary-fixed-dim": "#c6c6c6","error": "#ffb4ab","secondary-fixed-dim": "#c6c6c6",
          "on-surface": "#e5e2e1","on-secondary-fixed-variant": "#474747","surface-container-highest": "#353535",
          "on-background": "#e5e2e1","background": "#131313","surface-dim": "#131313","secondary": "#c6c6c6",
          "on-error-container": "#ffdad6","on-primary": "#2f3131","tertiary-fixed-dim": "#c7c6c6",
          "on-primary-fixed-variant": "#454747","tertiary": "#feffff","on-tertiary-fixed": "#1b1c1c",
          "on-primary-container": "#636465","error-container": "#93000a","on-secondary-fixed": "#1b1b1b",
          "on-error": "#690005","inverse-surface": "#e5e2e1","surface-container-high": "#2a2a2a",
          "outline-variant": "#444748","on-primary-fixed": "#1a1c1c","secondary-fixed": "#e2e2e2",
          "on-secondary": "#303030","inverse-primary": "#5d5f5f","surface-tint": "#c6c6c6",
          "surface-container-lowest": "#0e0e0e","primary": "#ffffff","surface-bright": "#393939",
          "secondary-container": "#474747","outline": "#8e9192","on-tertiary-fixed-variant": "#464747",
          "inverse-on-surface": "#313030","surface-container": "#20201f","on-tertiary": "#303031",
          "on-surface-variant": "#c4c7c8","surface": "#131313","primary-fixed": "#e2e2e2",
          "primary-container": "#e2e2e2","on-tertiary-container": "#646464","tertiary-container": "#e3e2e2",
          "surface-container-low": "#1c1b1b"
        },
        borderRadius: { "DEFAULT": "0px","lg": "0px","xl": "0px","full": "9999px" },
        spacing: {
          "margin-edge": "64px","container-max": "1440px","unit": "8px","gutter": "24px","section-gap": "120px"
        },
        fontFamily: {
          "headline-md": ["Noto Serif"],"display-xl": ["Noto Serif"],"body-md": ["Manrope"],
          "body-lg": ["Manrope"],"label-sm": ["Manrope"],"headline-lg": ["Noto Serif"]
        },
        fontSize: {
          "headline-md": ["32px",{"lineHeight":"40px","fontWeight":"400"}],
          "display-xl": ["72px",{"lineHeight":"80px","letterSpacing":"-0.02em","fontWeight":"300"}],
          "body-md": ["16px",{"lineHeight":"24px","fontWeight":"400"}],
          "body-lg": ["18px",{"lineHeight":"28px","fontWeight":"400"}],
          "label-sm": ["12px",{"lineHeight":"16px","letterSpacing":"0.1em","fontWeight":"600"}],
          "headline-lg": ["40px",{"lineHeight":"48px","fontWeight":"400"}]
        }
      }
    }
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: #000; color: #e5e2e1; overflow-x: hidden; }

  /* ── BACKGROUND IMAGE with Ken Burns zoom + drift ── */
  .hero-bg {
    position: absolute;
    inset: -8%;           /* overshoot so zoom never exposes edges */
    background-image: url('photo/wedding dress.jpg');
    background-size: cover;
    background-position: center top;
    animation: kenBurns 18s ease-out forwards;
    will-change: transform;
  }

  @keyframes kenBurns {
    0%   { transform: scale(1.15) translate(1%, 2%); filter: brightness(0.55); }
    40%  { filter: brightness(0.65); }
    100% { transform: scale(1.0)  translate(0%,  0%); filter: brightness(0.60); }
  }

  /* ── Grain overlay ── */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
    animation: grainShift 0.5s steps(1) infinite;
  }
  @keyframes grainShift {
    0%  { background-position: 0 0; }
    25% { background-position: 40px -30px; }
    50% { background-position: -20px 60px; }
    75% { background-position: 70px 20px; }
  }

  /* ── Chrome gradient button ── */
  .chrome-gradient {
    background: linear-gradient(135deg, #FFFFFF 0%, #A3A3A3 50%, #D4D4D4 100%);
  }

  /* ── LOGO: transparent bg, letter-spacing reveal ── */
  .logo-text {
    background: transparent;
    font-size: 1.875rem;
    font-weight: 300;
    letter-spacing: 0.5em;
    color: #fff;
    text-transform: uppercase;
    opacity: 0;
    animation: logoReveal 2s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
  }
  @keyframes logoReveal {
    from { opacity: 0; letter-spacing: 0.8em; }
    to   { opacity: 1; letter-spacing: 0.5em; }
  }

  /* ── Header fade in ── */
  header {
    animation: fadeDown 1.2s ease 0s both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Hero title stagger ── */
  .hero-title {
    opacity: 0;
    animation: riseUp 1.6s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
  }
  .hero-line {
    opacity: 0;
    animation: riseUp 1.4s cubic-bezier(0.16,1,0.3,1) 1.4s forwards;
    display: block;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    font-family: 'Manrope', sans-serif;
    margin-bottom: 2.5rem;
  }
  .hero-btn {
    opacity: 0;
    animation: riseUp 1.2s cubic-bezier(0.16,1,0.3,1) 1.8s forwards;
  }
  @keyframes riseUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Vignette ── */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
    z-index: 3;
    pointer-events: none;
  }

  /* ── Subtle shimmer line under logo ── */
  .logo-shimmer {
    position: relative;
    display: inline-block;
  }
  .logo-shimmer::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    transform: scaleX(0);
    animation: shimmerLine 1.8s ease 1.2s forwards;
  }
  @keyframes shimmerLine {
    to { transform: scaleX(1); }
  }

  /* ── Footer ── */
  footer {
    animation: fadeUp 1.2s ease 0.3s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Button hover polish ── */
  .hero-btn-inner {
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
  }
  .hero-btn-inner:hover {
    transform: scale(1.04);
    box-shadow: 0 8px 32px rgba(255,255,255,0.18);
  }
  .hero-btn-inner:active { transform: scale(0.97); }
</style>
</head>
<body class="font-body-md text-body-md overflow-x-hidden">

<!-- Grain overlay -->
<div class="grain"></div>

<!-- TopNavBar -->
<header class="fixed top-0 z-50 w-full backdrop-blur-md border-b border-zinc-800 flex justify-between items-center px-16 py-6">
  <div class="logo-shimmer">
    <span class="logo-text cursor-pointer   " >AURELIA</span>
  </div>
</header>

<main>
  <!-- Hero Section -->
  <section class="relative h-screen w-full flex items-center justify-center overflow-hidden">

    <!-- Animated background image -->
    <div class="hero-bg"></div>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Top-to-bottom gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-black/50 z-[4]"></div>

    <!-- Hero content -->
    <div class="relative z-10 text-center px-6 flex flex-col items-center">
      <h1 class="hero-title font-display-xl text-display-xl text-white mb-4 tracking-[0.3em]" style="font-size:clamp(2.5rem,7vw,5rem);">
        THE SILVER ARCHIVE
      </h1>
      <span class="hero-line">Couture · 2026 Collection</span>
      <div class="hero-btn">
        <a href="collection.html">
            <button class="hero-btn-inner chrome-gradient text-black font-label-sm px-12 py-5 tracking-[0.2em] border border-white/20">
              DISCOVER COLLECTION
            </button>
        </a>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-2 opacity-0"
         style="animation: riseUp 1s ease 2.6s forwards;">
      <span style="font-size:9px;letter-spacing:0.25em;color:rgba(255,255,255,0.4);font-family:'Manrope',sans-serif;text-transform:uppercase;">Scroll</span>
      <div style="width:1px;height:36px;background:linear-gradient(to bottom,rgba(255,255,255,0.5),transparent);animation:scrollPulse 2s ease-in-out 3s infinite;"></div>
    </div>
  </section>
</main>

<!-- Footer -->
<footer class="bg-black w-full border-t border-zinc-800">
  <div class="max-w-7xl mx-auto px-16 py-20 flex flex-col md:flex-row justify-between items-center gap-8">
    <div class="text-xl font-light text-zinc-100 tracking-[0.4em] uppercase">AURELIA</div>
    <div class="flex gap-10">
      <a class="font-serif uppercase tracking-widest text-[10px] text-zinc-600 hover:text-zinc-200 transition-colors" href="#">Privacy Policy</a>
      <a class="font-serif uppercase tracking-widest text-[10px] text-zinc-600 hover:text-zinc-200 transition-colors" href="#">Terms of Service</a>
      <a class="font-serif uppercase tracking-widest text-[10px] text-zinc-600 hover:text-zinc-200 transition-colors" href="#">Shipping</a>
      <a class="font-serif uppercase tracking-widest text-[10px] text-zinc-600 hover:text-zinc-200 transition-colors" href="#">Contact</a>
    </div>
    <div class="font-serif uppercase tracking-widest text-[10px] text-zinc-400">
      © 2026 AURELIA ATELIER. ALL RIGHTS RESERVED.
    </div>
  </div>
</footer>

<style>
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.5; transform: scaleY(1); }
    50%       { opacity: 1;   transform: scaleY(1.3); }
  }
</style>
</body>
</html>
